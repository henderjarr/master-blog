{% extends "base.html" %}
{% block content %}
    <h1>Welcome to My Flask Blog!</h1>
    <div><a class="add-book-button" href="{{ url_for('add') }}">Add a new book</a></div>
    {% for post in posts %}
    <div class="post">
        <h2>{{ post['title'] }}</h2>
        <p><em>Written by {{ post['author'] }}</em></p>
        <p>{{ post['content'] }}</p>
        <form  action="{{ url_for('delete', post_id=post['id']) }}" method="POST">
            <button type="submit" class="delete-button">Delete</button>
        </form>
    </div>
    {% endfor %}
{% endblock %}
